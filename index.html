<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CU Career Manager Prototype</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --cu-bg: #fbfcfe;
  --cu-surface: #ffffff;
  --cu-text: #1b1f2a;
  --cu-muted: #7d8597;
  --cu-line: #e8ecf3;
  --cu-blue: #4c68ff;
  --cu-blue-soft: #f1f4ff;
  --cu-green: #1fb26b;
  --cu-green-soft: #ebfaf1;
  --cu-amber: #f5b940;
  --cu-amber-soft: #fff6df;
  --cu-shadow: 0 6px 20px rgba(15, 23, 42, 0.04);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
  background: var(--cu-bg);
  color: var(--cu-text);
  font-family: "Inter", "Segoe UI", sans-serif;
}

a { color: inherit; text-decoration: none; }
button, input, textarea { font: inherit; }
button { cursor: pointer; }
.cu-shell { min-height: 100vh; }
.cu-topbar {
  display: flex; align-items: center; justify-content: space-between; gap: 24px;
  height: 92px; padding: 0 20px 0 14px; background: rgba(255,255,255,.96); border-bottom: 1px solid var(--cu-line);
}
.cu-brand { display:flex; align-items:center; gap:16px; min-width:260px; }
.cu-brand-mark { position:relative; width:40px; height:40px; flex:0 0 40px; }
.cu-brand-mark span { position:absolute; display:block; border:2px solid var(--cu-text); transform:rotate(45deg); }
.cu-brand-mark span:nth-child(1) { left:0; top:13px; width:18px; height:18px; }
.cu-brand-mark span:nth-child(2) { right:0; top:0; width:18px; height:18px; }
.cu-brand-mark span:nth-child(3) { left:11px; bottom:0; width:18px; height:18px; }
.cu-brand-text { font-size:15px; font-weight:800; line-height:.92; text-transform:uppercase; letter-spacing:.01em; }
.cu-topnav { display:flex; align-items:center; gap:6px; flex:1 1 auto; }
.cu-topnav-link { border:0; background:transparent; border-radius:14px; padding:12px 16px; color:#434b5d; font-size:17px; font-weight:500; }
.cu-topnav-link.active { background:#f2f5fb; color:var(--cu-blue); }
.cu-topbar-actions { display:flex; align-items:center; gap:12px; }
.cu-late-days {
  display:inline-flex; align-items:center; gap:10px; padding:12px 16px; border-radius:14px;
  background:#f5f7fb; color:#2b3240; font-size:15px; font-weight:500;
}
.cu-avatar {
  display:inline-flex; align-items:center; justify-content:center; width:52px; height:52px; border-radius:999px;
  background:#f3f5f9; color:#2b3240; font-size:17px; font-weight:500;
}
.cu-layout { display:flex; min-height:calc(100vh - 92px); }
.cu-sidebar { width:250px; padding:18px 16px; border-right:1px solid var(--cu-line); background:rgba(255,255,255,.88); }
.cu-sidebar-nav { display:flex; flex-direction:column; gap:6px; }
.cu-sidebar-link {
  display:flex; align-items:center; gap:14px; width:100%; border:0; background:transparent;
  padding:13px 14px; border-radius:18px; color:#5c6475; text-align:left;
}
.cu-sidebar-link.active { background:var(--cu-blue-soft); color:var(--cu-blue); }
.cu-sidebar-icon { display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; color:currentColor; }
.cu-sidebar-label { font-size:16px; font-weight:500; }
.cu-main { flex:1 1 auto; min-width:0; padding:34px 48px 40px; }
.cu-breadcrumbs { display:flex; align-items:center; gap:12px; color:#858c9c; font-size:15px; font-weight:500; }
.cu-breadcrumbs span:last-child { color:var(--cu-blue); }
.cu-page-title { margin:20px 0 0; font-size:54px; line-height:1.05; font-weight:800; letter-spacing:-.03em; }
.cu-page-subtitle { margin:16px 0 0; max-width:840px; color:#6f7788; font-size:18px; line-height:1.7; }
.cu-panel { background:var(--cu-surface); border:1px solid var(--cu-line); border-radius:28px; box-shadow:var(--cu-shadow); }
.cu-section { margin-top:28px; }
.cu-panel-pad { padding:28px; }
.cu-progress { display:flex; align-items:center; gap:12px; margin-top:30px; overflow-x:auto; padding-bottom:4px; }
.cu-progress-line { flex:1 0 72px; min-width:72px; height:1px; border-top:1px dashed #d9dfeb; }
.cu-step { display:flex; align-items:center; gap:14px; min-width:190px; }
.cu-step-dot {
  display:flex; align-items:center; justify-content:center; width:52px; height:52px; border-radius:999px;
  background:#eef1f7; color:#5f6778; font-size:18px; font-weight:700;
}
.cu-step-dot.active { background:var(--cu-blue); color:white; }
.cu-step-dot.done { background:var(--cu-green-soft); color:var(--cu-green); }
.cu-step-title { font-size:16px; font-weight:700; }
.cu-step-meta { margin-top:4px; color:#7d8597; font-size:14px; }
.cu-grid-2 { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:20px; }
.cu-grid-3 { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:16px; }
.cu-kpi-card, .cu-soft-card { border-radius:22px; background:#f7f9fc; border:1px solid #edf1f7; }
.cu-kpi-card { padding:18px; }
.cu-soft-card { padding:20px; }
.cu-label { color:#81899a; font-size:14px; font-weight:500; }
.cu-strong { margin-top:8px; font-size:20px; font-weight:700; line-height:1.35; letter-spacing:-.02em; }
.cu-badge { display:inline-flex; align-items:center; gap:6px; padding:7px 12px; border-radius:999px; font-size:13px; font-weight:600; }
.cu-badge.blue { background:var(--cu-blue-soft); color:var(--cu-blue); }
.cu-badge.green { background:var(--cu-green-soft); color:var(--cu-green); }
.cu-badge.amber { background:var(--cu-amber-soft); color:#a36b00; }
.cu-badge.gray { background:#f4f6fa; color:#667084; }
.cu-button, .cu-button-secondary, .cu-button-quiet {
  display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:46px; padding:0 18px;
  border-radius:16px; border:1px solid transparent; font-size:15px; font-weight:600;
}
.cu-button { background:var(--cu-blue); color:white; }
.cu-button-secondary { background:white; border-color:#dbe2ef; color:#2a3040; }
.cu-button-quiet { background:#f5f7fb; color:#485062; }
.cu-button[disabled] { opacity:.45; cursor:not-allowed; }
.cu-card-title { margin:0; font-size:24px; line-height:1.2; font-weight:800; letter-spacing:-.02em; }
.cu-card-subtitle { margin:10px 0 0; color:#6f7788; font-size:15px; line-height:1.7; }
.cu-split-actions { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:18px; }
.cu-choice-card { min-height:260px; padding:28px; border:1px solid var(--cu-line); border-radius:24px; background:#fff; }
.cu-note { padding:18px 20px; border-radius:20px; background:#f7f8fc; color:#697183; font-size:15px; line-height:1.7; }
.cu-note strong { color:#404859; }
.cu-fields { display:grid; gap:18px; margin-top:22px; }
.cu-field { display:grid; gap:8px; }
.cu-field-label { font-size:14px; font-weight:600; color:#353d4d; }
.cu-input, .cu-textarea {
  width:100%; border:1px solid #dfe5f0; border-radius:18px; background:white; color:var(--cu-text);
  padding:15px 16px; font-size:15px; outline:none;
}
.cu-textarea { resize:vertical; min-height:140px; }
.cu-input:focus, .cu-textarea:focus { border-color:#aab9ff; }
.cu-segmented { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:12px; }
.cu-segment { border:1px solid #dfe5f0; border-radius:20px; background:white; padding:18px; text-align:left; }
.cu-segment.active { border-color:#cfd8ff; background:var(--cu-blue-soft); color:var(--cu-blue); }
.cu-segment-title { font-size:16px; font-weight:700; }
.cu-segment-copy { margin-top:6px; color:#70788a; font-size:14px; line-height:1.55; }
.cu-action-row { display:flex; flex-wrap:wrap; gap:10px; margin-top:24px; }
.cu-table-wrap { overflow:auto; border-radius:28px; border:1px solid var(--cu-line); background:white; box-shadow:var(--cu-shadow); }
.cu-table { width:100%; border-collapse:collapse; min-width:980px; }
.cu-table th { padding:16px 20px; background:#f7f9fc; color:#7f8798; font-size:13px; font-weight:600; text-align:left; }
.cu-table td { padding:18px 20px; border-top:1px solid var(--cu-line); font-size:14px; color:#394150; vertical-align:top; }
.cu-table strong { color:var(--cu-text); }
.cu-list { display:grid; gap:14px; margin-top:20px; }
.cu-list-row {
  display:flex; align-items:flex-start; justify-content:space-between; gap:20px;
  border:1px solid #edf1f7; border-radius:22px; background:#f9fbfd; padding:18px 20px;
}
.cu-list-title { font-size:18px; font-weight:700; letter-spacing:-.02em; }
.cu-list-copy { margin-top:6px; color:#727b8c; font-size:14px; line-height:1.65; }
.cu-mini-actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
.cu-slot-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:16px; }
.cu-slot { border:1px solid #dfe5f0; border-radius:20px; background:white; padding:18px; text-align:left; }
.cu-slot.active { border-color:#cfd8ff; background:var(--cu-blue-soft); }
.cu-toast {
  position:fixed; right:24px; bottom:24px; z-index:50; display:none; padding:14px 18px; border-radius:16px;
  background:#1f2432; color:white; font-size:14px; font-weight:500; box-shadow:0 14px 24px rgba(15,23,42,.14);
}
.cu-toast.show { display:block; }
.cu-mobile-note { display:none; }

@media (max-width: 1200px) {
  .cu-grid-2, .cu-grid-3, .cu-split-actions, .cu-slot-grid { grid-template-columns:1fr; }
  .cu-main { padding:24px; }
}

@media (max-width: 960px) {
  .cu-topnav, .cu-sidebar { display:none; }
  .cu-mobile-note {
    display:block; padding:16px 20px; border-bottom:1px solid var(--cu-line);
    color:#6f7788; background:white; font-size:14px;
  }
  .cu-main { padding:20px; }
  .cu-page-title { font-size:40px; }
}
  </style>
</head>
<body>
  <div class="cu-shell">
    <header class="cu-topbar">
      <div class="cu-brand">
        <a href="./index.html" class="cu-brand" style="min-width:auto">
          <div class="cu-brand-mark" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
          <div class="cu-brand-text">Центральный<br>университет</div>
        </a>
      </div>

      <nav class="cu-topnav" aria-label="Главная навигация">
        <button class="cu-topnav-link">Мероприятия</button>
        <button class="cu-topnav-link active">Обучение</button>
        <button class="cu-topnav-link">Time</button>
        <button class="cu-topnav-link">Поддержка</button>
        <button class="cu-topnav-link">Хендбук студента</button>
      </nav>

      <div class="cu-topbar-actions">
        <div class="cu-late-days">
          <span id="managerCalendarIcon"></span>
          <span>Career cases: 132</span>
        </div>
        <button class="cu-button-quiet" style="min-width:46px;padding:0 14px" aria-label="Уведомления">
          <span id="managerBellIcon"></span>
        </button>
        <div class="cu-avatar">МС</div>
      </div>
    </header>

    <div class="cu-mobile-note">Прототип собран под desktop и стилизован как внутренний кабинет LMS.</div>

    <div class="cu-layout">
      <aside class="cu-sidebar">
        <nav id="managerNav" class="cu-sidebar-nav"></nav>
      </aside>

      <main class="cu-main">
        <div id="managerContent"></div>
      </main>
    </div>
  </div>

  <div id="managerToast" class="cu-toast"></div>

  <script>
    const managerState = {
      view: "dashboard",
      selectedStudentId: 1,
      students: [
        {
          id: 1,
          name: "Анна Кузнецова",
          program: "Машинное обучение",
          track: "Стажировка",
          currentStage: "Резюме",
          status: "На проверке",
          targetGrade: "Intern / Junior",
          actualGrade: "—",
          nextAction: "Проверить резюме",
          sla: "до 18:00",
          resume: "Resume_Anna_Kuznetsova.pdf",
          expectations: "Аналитика, ML Product, Data Science",
          assessmentStatus: "Ожидает записи",
          assessorFeedback: "После assessment здесь появится структурная обратная связь.",
          vacancies: [
            { company: "Т-Банк", role: "Product Analyst Intern", status: "Подобрана", priority: 1 },
            { company: "Яндекс", role: "ML Product Intern", status: "Подобрана", priority: 2 },
            { company: "Авито", role: "Data Analyst Intern", status: "Подобрана", priority: 3 }
          ]
        },
        {
          id: 2,
          name: "Марк Ершов",
          program: "Продуктовая аналитика",
          track: "Работа",
          currentStage: "Assessment",
          status: "Запланирован",
          targetGrade: "Junior",
          actualGrade: "—",
          nextAction: "Дождаться результата assessment",
          sla: "7 мая",
          resume: "Resume_Mark_Ershov.pdf",
          expectations: "Продуктовая аналитика, Growth, финтех",
          assessmentStatus: "Запланирован",
          assessorFeedback: "Собеседование назначено на 7 мая, 12:00.",
          vacancies: [
            { company: "МТС", role: "Junior Product Analyst", status: "В очереди на отправку", priority: 1 }
          ]
        },
        {
          id: 3,
          name: "София Петрова",
          program: "Машинное обучение",
          track: "Стажировка",
          currentStage: "Вакансии",
          status: "Ждет отправки партнерам",
          targetGrade: "Intern",
          actualGrade: "Intern",
          nextAction: "Отправить резюме по приоритету #1",
          sla: "сегодня",
          resume: "Resume_Sofia_Petrova.pdf",
          expectations: "ML, аналитика, продуктовые команды",
          assessmentStatus: "Завершен",
          assessorFeedback: "Хорошая база по моделям и сильная коммуникация. Рекомендуется практика в продуктовых кейсах.",
          vacancies: [
            { company: "Яндекс", role: "ML Intern", status: "Компания ждет резюме", priority: 1 },
            { company: "Авито", role: "Data Intern", status: "Резерв", priority: 2 }
          ]
        }
      ]
    };

    const managerMenu = [
      { id: "dashboard", label: "Дашборд", icon: "dashboard" },
      { id: "students", label: "Студенты", icon: "users" },
      { id: "card", label: "Карточка студента", icon: "file" },
      { id: "assessment", label: "Assessment", icon: "target" },
      { id: "vacancies", label: "Вакансии", icon: "bag" },
      { id: "settings", label: "Настройки", icon: "settings", muted: true }
    ];

    function icon(name, size = 20) {
      const common = `width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"`;
      const icons = {
        calendar: `<svg ${common}><rect x="3" y="4" width="18" height="17" rx="3"></rect><path d="M16 2v4"></path><path d="M8 2v4"></path><path d="M3 10h18"></path></svg>`,
        bell: `<svg ${common}><path d="M6.26 17h11.48"></path><path d="M8 17V10a4 4 0 1 1 8 0v7"></path><path d="M10 21a2 2 0 0 0 4 0"></path></svg>`,
        dashboard: `<svg ${common}><rect x="3" y="3" width="8" height="8" rx="2"></rect><rect x="13" y="3" width="8" height="5" rx="2"></rect><rect x="13" y="10" width="8" height="11" rx="2"></rect><rect x="3" y="13" width="8" height="8" rx="2"></rect></svg>`,
        users: `<svg ${common}><path d="M16 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="10" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>`,
        file: `<svg ${common}><path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7z"></path><path d="M14 2v5h5"></path></svg>`,
        target: `<svg ${common}><circle cx="12" cy="12" r="7"></circle><circle cx="12" cy="12" r="3"></circle></svg>`,
        bag: `<svg ${common}><path d="M6 8h12"></path><path d="M8 8a4 4 0 0 1 8 0"></path><path d="M5 8h14l-1 11H6L5 8Z"></path></svg>`,
        settings: `<svg ${common}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.6 1.6 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.6 1.6 0 0 0-1.82-.33 1.6 1.6 0 0 0-1 1.46V21a2 2 0 1 1-4 0v-.09a1.6 1.6 0 0 0-1-1.46 1.6 1.6 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.6 1.6 0 0 0 .33-1.82 1.6 1.6 0 0 0-1.46-1H3a2 2 0 1 1 0-4h.09a1.6 1.6 0 0 0 1.46-1 1.6 1.6 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.6 1.6 0 0 0 1.82.33h.02a1.6 1.6 0 0 0 1-1.46V3a2 2 0 1 1 4 0v.09a1.6 1.6 0 0 0 1 1.46h.02a1.6 1.6 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.6 1.6 0 0 0-.33 1.82v.02a1.6 1.6 0 0 0 1.46 1H21a2 2 0 1 1 0 4h-.09a1.6 1.6 0 0 0-1.46 1Z"></path></svg>`
      };
      return icons[name] || "";
    }

    document.getElementById("managerCalendarIcon").innerHTML = icon("calendar", 18);
    document.getElementById("managerBellIcon").innerHTML = icon("bell", 18);

    function badge(text, tone = "gray") {
      return `<span class="cu-badge ${tone}">${text}</span>`;
    }

    function selectedStudent() {
      return managerState.students.find((student) => student.id === managerState.selectedStudentId) || managerState.students[0];
    }

    function managerNavView() {
      return managerMenu.map((item) => `
        <button class="cu-sidebar-link ${managerState.view === item.id ? "active" : ""}" ${item.muted ? "" : `data-view="${item.id}"`}>
          <span class="cu-sidebar-icon">${icon(item.icon, 21)}</span>
          <span class="cu-sidebar-label">${item.label}</span>
        </button>
      `).join("");
    }

    function managerHeader(title, crumb, subtitle = "") {
      return `
        <div class="cu-breadcrumbs">
          <span>Обучение</span>
          <span>›</span>
          <span>${crumb}</span>
        </div>
        <h1 class="cu-page-title">${title}</h1>
        ${subtitle ? `<p class="cu-page-subtitle">${subtitle}</p>` : ""}
      `;
    }

    function dashboardView() {
      const metrics = [
        ["Новые заявки", "24", "blue"],
        ["Без резюме", "11", "amber"],
        ["На проверке", "18", "gray"],
        ["Ждут assessment", "9", "gray"],
        ["Повторный assessment", "4", "amber"],
        ["Готовы к отправке", "13", "green"]
      ];

      return `
        ${managerHeader("Рабочая очередь ЦПК", "Дашборд", "Операционный экран для работы со студентами: статусы, метрики, следующий шаг и готовность к отправке партнерам.")}

        <section class="cu-section cu-grid-3">
          ${metrics.map(([title, value, tone]) => `
            <div class="cu-panel cu-panel-pad">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:14px">
                <div class="cu-label">${title}</div>
                ${badge(value, tone)}
              </div>
              <div class="cu-strong" style="font-size:38px;margin-top:14px">${value}</div>
            </div>
          `).join("")}
        </section>

        <section class="cu-section cu-grid-2">
          <div class="cu-panel cu-panel-pad">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
              <div>
                <h2 class="cu-card-title">Требуют внимания</h2>
                <p class="cu-card-subtitle">Очередь приоритетных действий на сегодня.</p>
              </div>
              <button class="cu-button-secondary" data-view="students">Открыть студентов</button>
            </div>

            <div class="cu-list">
              <div class="cu-list-row">
                <div>
                  <div class="cu-list-title">Анна Кузнецова</div>
                  <div class="cu-list-copy">Проверить резюме и перевести на assessment.</div>
                </div>
                ${badge("до 18:00", "amber")}
              </div>
              <div class="cu-list-row">
                <div>
                  <div class="cu-list-title">София Петрова</div>
                  <div class="cu-list-copy">Отправить резюме партнеру по приоритету #1.</div>
                </div>
                ${badge("сегодня", "blue")}
              </div>
            </div>
          </div>

          <div class="cu-panel cu-panel-pad">
            <h2 class="cu-card-title">Воронка</h2>
            <div class="cu-list">
              <div class="cu-list-row"><div class="cu-list-title">Заявка</div><strong>132</strong></div>
              <div class="cu-list-row"><div class="cu-list-title">Резюме</div><strong>89</strong></div>
              <div class="cu-list-row"><div class="cu-list-title">Assessment</div><strong>47</strong></div>
              <div class="cu-list-row"><div class="cu-list-title">Вакансии</div><strong>29</strong></div>
            </div>
          </div>
        </section>
      `;
    }

    function studentsView() {
      return `
        ${managerHeader("Студенты", "Студенты", "Главный операционный экран для менеджера: фильтрация, статусы, SLA и быстрое открытие карточки кейса.")}

        <section class="cu-section cu-panel cu-panel-pad">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            ${badge("Этап: все", "blue")}
            ${badge("Без резюме", "gray")}
            ${badge("Ждут assessment", "gray")}
            ${badge("Без приоритета", "gray")}
            ${badge("В резерве", "gray")}
          </div>
        </section>

        <section class="cu-section cu-table-wrap">
          <table class="cu-table">
            <thead>
              <tr>
                <th>Студент</th>
                <th>Программа</th>
                <th>Этап</th>
                <th>Статус</th>
                <th>Грейд</th>
                <th>Следующее действие</th>
                <th>SLA</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${managerState.students.map((student) => `
                <tr>
                  <td><strong>${student.name}</strong><br><span style="color:#7c8496">${student.track}</span></td>
                  <td>${student.program}</td>
                  <td>${student.currentStage}</td>
                  <td>${badge(student.status, student.status === "На проверке" ? "blue" : "gray")}</td>
                  <td>${student.targetGrade} / ${student.actualGrade}</td>
                  <td>${student.nextAction}</td>
                  <td>${student.sla}</td>
                  <td><button class="cu-button-secondary" data-open-student="${student.id}">Открыть</button></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </section>
      `;
    }

    function cardView() {
      const student = selectedStudent();
      return `
        ${managerHeader(student.name, "Карточка студента", `${student.program} · ${student.track}. Вся информация по кейсу в одном месте: профиль, резюме, assessment и вакансии.`)}

        <section class="cu-section cu-grid-2">
          <div class="cu-panel cu-panel-pad">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
              <h2 class="cu-card-title">Профиль и ожидания</h2>
              ${badge(student.status, student.status === "На проверке" ? "blue" : "green")}
            </div>
            <div class="cu-grid-2" style="margin-top:22px;gap:14px">
              <div class="cu-soft-card">
                <div class="cu-label">Текущий этап</div>
                <div class="cu-strong">${student.currentStage}</div>
              </div>
              <div class="cu-soft-card">
                <div class="cu-label">Желаемый / факт грейд</div>
                <div class="cu-strong">${student.targetGrade} / ${student.actualGrade}</div>
              </div>
            </div>
            <div class="cu-soft-card" style="margin-top:14px">
              <div class="cu-label">Интересующие сферы</div>
              <div class="cu-strong">${student.expectations}</div>
            </div>
          </div>

          <div class="cu-panel cu-panel-pad">
            <h2 class="cu-card-title">Следующее действие</h2>
            <div class="cu-soft-card" style="margin-top:22px">
              <div class="cu-label">Что сделать менеджеру</div>
              <div class="cu-strong">${student.nextAction}</div>
              <div class="cu-card-subtitle">SLA: ${student.sla}</div>
            </div>
            <div class="cu-action-row">
              <button class="cu-button-secondary" data-view="assessment">Открыть assessment</button>
              <button class="cu-button-secondary" data-view="vacancies">Открыть вакансии</button>
            </div>
          </div>
        </section>

        <section class="cu-section cu-grid-2">
          <div class="cu-panel cu-panel-pad">
            <h2 class="cu-card-title">Актуальное резюме</h2>
            <div class="cu-soft-card" style="margin-top:22px">
              <div class="cu-label">Файл</div>
              <div class="cu-strong">${student.resume}</div>
              <div class="cu-card-subtitle">В интерфейсе хранится только актуальная версия резюме.</div>
            </div>
            <div class="cu-action-row">
              <button class="cu-button" data-action="approve-resume">Принять резюме</button>
              <button class="cu-button-secondary" data-action="request-revision">Вернуть на доработку</button>
            </div>
          </div>

          <div class="cu-panel cu-panel-pad">
            <h2 class="cu-card-title">Assessment</h2>
            <div class="cu-soft-card" style="margin-top:22px">
              <div class="cu-label">Статус</div>
              <div class="cu-strong">${student.assessmentStatus}</div>
            </div>
            <div class="cu-soft-card" style="margin-top:14px">
              <div class="cu-label">Обратная связь от ассесора</div>
              <div class="cu-card-subtitle" style="margin-top:8px">${student.assessorFeedback}</div>
            </div>
            <div class="cu-action-row">
              <button class="cu-button-secondary" data-action="schedule-assessment">Назначить assessment</button>
              <button class="cu-button-secondary" data-action="open-feedback">Добавить фидбек</button>
            </div>
          </div>
        </section>

        <section class="cu-section cu-panel cu-panel-pad">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
            <h2 class="cu-card-title">Вакансии и приоритеты</h2>
            <button class="cu-button-secondary" data-view="vacancies">Открыть экран</button>
          </div>
          <div class="cu-list">
            ${student.vacancies.map((vacancy) => `
              <div class="cu-list-row">
                <div>
                  <div class="cu-list-title">${vacancy.company} · ${vacancy.role}</div>
                  <div class="cu-list-copy">${vacancy.status}</div>
                </div>
                <div>${vacancy.priority ? badge(`Приоритет #${vacancy.priority}`, "blue") : badge("Без приоритета", "gray")}</div>
              </div>
            `).join("")}
          </div>
        </section>
      `;
    }

    function assessmentView() {
      const student = selectedStudent();

      return `
        ${managerHeader("Assessment и обратная связь", "Assessment", "Экран для назначения времени, фиксации результата и заполнения обратной связи от ассесора.")}

        <section class="cu-section cu-grid-2">
          <div class="cu-panel cu-panel-pad">
            <h2 class="cu-card-title">${student.name}</h2>
            <div class="cu-grid-2" style="margin-top:22px;gap:14px">
              <div class="cu-soft-card">
                <div class="cu-label">Статус</div>
                <div class="cu-strong">${student.assessmentStatus}</div>
              </div>
              <div class="cu-soft-card">
                <div class="cu-label">Фактический грейд</div>
                <div class="cu-strong">${student.actualGrade}</div>
              </div>
            </div>
            <div class="cu-action-row">
              <button class="cu-button" data-action="schedule-assessment">Назначить слот</button>
              <button class="cu-button-secondary" data-action="mark-result">Зафиксировать результат</button>
            </div>
          </div>

          <div class="cu-panel cu-panel-pad">
            <h2 class="cu-card-title">Обратная связь от ассесора</h2>
            <textarea id="feedbackInput" class="cu-textarea" style="margin-top:22px;min-height:220px">${student.assessorFeedback}</textarea>
            <div class="cu-action-row">
              <button class="cu-button" data-action="save-feedback">Сохранить обратную связь</button>
              <button class="cu-button-secondary" data-action="set-grade-junior">Поставить Junior</button>
              <button class="cu-button-secondary" data-action="set-grade-intern">Поставить Intern</button>
            </div>
          </div>
        </section>
      `;
    }

    function vacanciesView() {
      const student = selectedStudent();

      return `
        ${managerHeader("Подбор и отправка вакансий", "Вакансии", "Экран менеджера для работы с релевантными ролями, приоритетами студента и отправкой резюме партнерам.")}

        <section class="cu-section">
          <div class="cu-list">
            ${student.vacancies.map((vacancy) => `
              <div class="cu-panel cu-panel-pad">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap">
                  <div>
                    <div class="cu-label" style="text-transform:uppercase;letter-spacing:.1em">${vacancy.company}</div>
                    <div class="cu-strong">${vacancy.role}</div>
                    <div class="cu-card-subtitle">Приоритет студента: ${vacancy.priority ? `#${vacancy.priority}` : "не указан"}.</div>
                  </div>
                  <div class="cu-soft-card" style="min-width:280px">
                    <div class="cu-label">Статус</div>
                    <div class="cu-strong">${vacancy.status}</div>
                    <div class="cu-mini-actions">
                      <button class="cu-button" data-action="send-partner" data-company="${vacancy.company}">Отправить партнеру</button>
                      <button class="cu-button-secondary" data-action="move-reserve" data-company="${vacancy.company}">В резерв</button>
                    </div>
                  </div>
                </div>
              </div>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderManager() {
      document.getElementById("managerNav").innerHTML = managerNavView();
      const views = {
        dashboard: dashboardView,
        students: studentsView,
        card: cardView,
        assessment: assessmentView,
        vacancies: vacanciesView
      };
      document.getElementById("managerContent").innerHTML = views[managerState.view]();
    }

    function toast(message) {
      const el = document.getElementById("managerToast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.classList.remove("show"), 2200);
    }

    document.addEventListener("click", (event) => {
      const viewButton = event.target.closest("[data-view]");
      if (viewButton) {
        managerState.view = viewButton.dataset.view;
        renderManager();
        return;
      }

      const openStudentButton = event.target.closest("[data-open-student]");
      if (openStudentButton) {
        managerState.selectedStudentId = Number(openStudentButton.dataset.openStudent);
        managerState.view = "card";
        renderManager();
        return;
      }

      const actionButton = event.target.closest("[data-action]");
      if (!actionButton) return;

      const student = selectedStudent();
      const action = actionButton.dataset.action;

      if (action === "approve-resume") {
        student.status = "Резюме принято";
        student.currentStage = "Assessment";
        student.nextAction = "Назначить assessment";
        student.assessmentStatus = "Ожидает записи";
        toast("Резюме принято");
        renderManager();
        return;
      }

      if (action === "request-revision") {
        student.status = "Нужны доработки";
        student.nextAction = "Ждать обновленное резюме";
        toast("Резюме возвращено на доработку");
        renderManager();
        return;
      }

      if (action === "schedule-assessment") {
        student.currentStage = "Assessment";
        student.assessmentStatus = "Запланирован";
        student.nextAction = "Дождаться результатов assessment";
        toast("Assessment назначен");
        renderManager();
        return;
      }

      if (action === "open-feedback") {
        managerState.view = "assessment";
        renderManager();
        return;
      }

      if (action === "save-feedback") {
        const input = document.getElementById("feedbackInput");
        student.assessorFeedback = input ? input.value : student.assessorFeedback;
        toast("Обратная связь сохранена");
        renderManager();
        return;
      }

      if (action === "set-grade-junior") {
        student.actualGrade = "Junior";
        student.assessmentStatus = "Завершен";
        student.currentStage = "Вакансии";
        student.nextAction = "Подобрать вакансии и отправить партнеру";
        toast("Грейд Junior сохранен");
        renderManager();
        return;
      }

      if (action === "set-grade-intern") {
        student.actualGrade = "Intern";
        student.assessmentStatus = "Завершен";
        student.currentStage = "Вакансии";
        student.nextAction = "Подобрать вакансии и отправить партнеру";
        toast("Грейд Intern сохранен");
        renderManager();
        return;
      }

      if (action === "mark-result") {
        student.assessmentStatus = "Завершен";
        toast("Результат assessment зафиксирован");
        renderManager();
        return;
      }

      if (action === "send-partner") {
        const vacancy = student.vacancies.find((item) => item.company === actionButton.dataset.company);
        if (vacancy) vacancy.status = "Отправлено партнеру";
        student.status = "На рассмотрении у партнера";
        toast(`Резюме отправлено в ${actionButton.dataset.company}`);
        renderManager();
        return;
      }

      if (action === "move-reserve") {
        const vacancy = student.vacancies.find((item) => item.company === actionButton.dataset.company);
        if (vacancy) vacancy.status = "Резерв";
        toast(`${actionButton.dataset.company} перенесена в резерв`);
        renderManager();
      }
    });

    renderManager();
  </script>
</body>
</html>
