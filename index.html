<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CU Career Student Prototype</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./theme.css">
</head>
<body>
  <div class="cu-shell">
    <header class="cu-topbar">
      <div class="cu-brand">
        <a href="./index.html" class="cu-brand" style="min-width:auto">
          <div class="cu-brand-mark" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
          <div class="cu-brand-text">Центральный<br>университет</div>
        </a>
      </div>

      <nav class="cu-topnav" aria-label="Главная навигация">
        <button class="cu-topnav-link">Мероприятия</button>
        <button class="cu-topnav-link active">Обучение</button>
        <button class="cu-topnav-link">Time</button>
        <button class="cu-topnav-link">Поддержка</button>
        <button class="cu-topnav-link">Хендбук студента</button>
      </nav>

      <div class="cu-topbar-actions">
        <div class="cu-late-days">
          <span id="topCalendarIcon"></span>
          <span>Late days: 0</span>
        </div>
        <button class="cu-button-quiet" style="min-width:46px;padding:0 14px" aria-label="Уведомления">
          <span id="topBellIcon"></span>
        </button>
        <div class="cu-avatar">АК</div>
      </div>
    </header>

    <div class="cu-mobile-note">Прототип собран под desktop и повторяет визуальную логику LMS CU.</div>

    <div class="cu-layout">
      <aside class="cu-sidebar">
        <nav id="studentNav" class="cu-sidebar-nav"></nav>
      </aside>

      <main class="cu-main">
        <div id="studentContent"></div>
      </main>
    </div>
  </div>

  <div id="studentToast" class="cu-toast"></div>

  <script>
    const studentState = {
      view: "journey",
      application: {
        fullName: "Анна Кузнецова",
        course: "3 курс",
        program: "Машинное обучение",
        track: "Стажировка",
        grade: "Intern / Junior",
        spheres: "Аналитика, ML Product, Data Science",
        expectations: "Хочу выйти на стажировку в продуктовую команду с сильным наставничеством и понятным карьерным треком.",
        submitted: true
      },
      resume: {
        status: "В работе",
        fileName: "",
        consultSlot: "",
        note: "Загрузите резюме или выберите слот консультации."
      },
      calendar: {
        selectedSlot: ""
      },
      assessment: {
        status: "Ожидает",
        slot: "",
        grade: "Не определен",
        feedback: "После прохождения менеджер добавит сюда обратную связь от ассесора."
      },
      vacancies: [
        {
          id: 1,
          company: "Т-Банк",
          role: "Product Analyst Intern",
          why: "Сильное совпадение по аналитике, SQL и продуктовому треку.",
          status: "Подобрана",
          priority: null
        },
        {
          id: 2,
          company: "Яндекс",
          role: "ML Product Intern",
          why: "Совпадает с интересом к ML Product и карьерным ожиданиям.",
          status: "Подобрана",
          priority: null
        },
        {
          id: 3,
          company: "Авито",
          role: "Data Analyst Intern",
          why: "Подходит по уровню и даёт быстрый вход в аналитику.",
          status: "Подобрана",
          priority: null
        }
      ]
    };

    const studentMenu = [
      { id: "journey", label: "Путь студента", icon: "target" },
      { id: "vacancies", label: "Вакансии", icon: "bag" },
      { id: "responses", label: "Отклики", icon: "send", muted: true },
      { id: "calendar", label: "Календарь", icon: "calendar" },
      { id: "materials", label: "Материалы", icon: "file", muted: true },
      { id: "profile", label: "Профиль", icon: "user", muted: true },
      { id: "settings", label: "Настройки", icon: "settings", muted: true }
    ];

    const studentRouteViews = new Set(["journey", "application", "resume", "calendar", "assessment", "vacancies"]);

    function icon(name, size = 20) {
      const common = `width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"`;
      const icons = {
        calendar: `<svg ${common}><rect x="3" y="4" width="18" height="17" rx="3"></rect><path d="M16 2v4"></path><path d="M8 2v4"></path><path d="M3 10h18"></path></svg>`,
        bell: `<svg ${common}><path d="M6.26 17h11.48"></path><path d="M8 17V10a4 4 0 1 1 8 0v7"></path><path d="M10 21a2 2 0 0 0 4 0"></path></svg>`,
        target: `<svg ${common}><circle cx="12" cy="12" r="7"></circle><circle cx="12" cy="12" r="3"></circle></svg>`,
        bag: `<svg ${common}><path d="M6 8h12"></path><path d="M8 8a4 4 0 0 1 8 0"></path><path d="M5 8h14l-1 11H6L5 8Z"></path></svg>`,
        send: `<svg ${common}><path d="m22 2-7 20-4-9-9-4Z"></path><path d="M22 2 11 13"></path></svg>`,
        file: `<svg ${common}><path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7z"></path><path d="M14 2v5h5"></path></svg>`,
        user: `<svg ${common}><circle cx="12" cy="8" r="4"></circle><path d="M5 20a7 7 0 0 1 14 0"></path></svg>`,
        settings: `<svg ${common}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.6 1.6 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.6 1.6 0 0 0-1.82-.33 1.6 1.6 0 0 0-1 1.46V21a2 2 0 1 1-4 0v-.09a1.6 1.6 0 0 0-1-1.46 1.6 1.6 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.6 1.6 0 0 0 .33-1.82 1.6 1.6 0 0 0-1.46-1H3a2 2 0 1 1 0-4h.09a1.6 1.6 0 0 0 1.46-1 1.6 1.6 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.6 1.6 0 0 0 1.82.33h.02a1.6 1.6 0 0 0 1-1.46V3a2 2 0 1 1 4 0v.09a1.6 1.6 0 0 0 1 1.46h.02a1.6 1.6 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.6 1.6 0 0 0-.33 1.82v.02a1.6 1.6 0 0 0 1.46 1H21a2 2 0 1 1 0 4h-.09a1.6 1.6 0 0 0-1.46 1Z"></path></svg>`,
        check: `<svg ${common}><path d="m5 13 4 4L19 7"></path></svg>`
      };
      return icons[name] || "";
    }

    document.getElementById("topCalendarIcon").innerHTML = icon("calendar", 18);
    document.getElementById("topBellIcon").innerHTML = icon("bell", 18);

    function badge(text, tone = "gray") {
      return `<span class="cu-badge ${tone}">${text}</span>`;
    }

    function step(index, title, meta, options = {}) {
      const dotClass = options.done ? "done" : options.active ? "active" : "";
      const dotContent = options.done ? icon("check", 18) : index;
      return `
        <div class="cu-step">
          <div class="cu-step-dot ${dotClass}">${dotContent}</div>
          <div>
            <div class="cu-step-title">${title}</div>
            <div class="cu-step-meta">${meta}</div>
          </div>
        </div>
      `;
    }

    function studentNavView() {
      const activeMap = {
        journey: "journey",
        application: "journey",
        resume: "journey",
        calendar: "calendar",
        assessment: "journey",
        vacancies: "vacancies"
      };
      const activeBase = activeMap[studentState.view] || "journey";

      return studentMenu.map(item => `
        <button class="cu-sidebar-link ${activeBase === item.id ? "active" : ""}" ${item.muted ? "" : `data-route="${item.id}"`}>
          <span class="cu-sidebar-icon">${icon(item.icon, 21)}</span>
          <span class="cu-sidebar-label">${item.label}</span>
        </button>
      `).join("");
    }

    function studentHeader(title, crumb, subtitle = "") {
      return `
        <div class="cu-breadcrumbs">
          <span>Обучение</span>
          <span>›</span>
          <span>${crumb}</span>
        </div>
        <h1 class="cu-page-title">${title}</h1>
        ${subtitle ? `<p class="cu-page-subtitle">${subtitle}</p>` : ""}
      `;
    }

    function journeyView() {
      return `
        ${studentHeader("Путь студента", "Путь студента")}

        <section class="cu-section cu-panel cu-panel-pad">
          <div class="cu-progress">
            ${step(1, "Заявка", "Пройдено", { done: true })}
            <div class="cu-progress-line"></div>
            ${step(2, "Резюме", studentState.resume.status, { active: true })}
            <div class="cu-progress-line"></div>
            ${step(3, "Assessment", studentState.assessment.status)}
            <div class="cu-progress-line"></div>
            ${step(4, "Вакансии", "Ожидает")}
          </div>
        </section>

        <section class="cu-section cu-panel cu-panel-pad">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap">
            <div>
              <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
                <h2 class="cu-card-title">Резюме</h2>
                ${badge(studentState.resume.status, "blue")}
              </div>
              <p class="cu-card-subtitle">Загрузите резюме или создайте его вместе с карьерным консультантом. После этого этапа откроется запись на assessment.</p>
            </div>
            <button class="cu-button" data-route="resume">Продолжить</button>
          </div>

          <div class="cu-split-actions" style="margin-top:28px">
            <div class="cu-choice-card">
              <div class="cu-label">Текущий статус</div>
              <div class="cu-strong">${studentState.resume.fileName || "Резюме пока не загружено"}</div>
              <p class="cu-card-subtitle">${studentState.resume.consultSlot ? `Консультация назначена: ${studentState.resume.consultSlot}` : "Можно сразу загрузить файл или сначала выбрать слот консультации."}</p>
              <div class="cu-action-row">
                <button class="cu-button-secondary" data-route="resume">Открыть этап</button>
              </div>
            </div>

            <div class="cu-choice-card">
              <div class="cu-label">Карьерные ожидания</div>
              <div class="cu-strong">${studentState.application.grade}</div>
              <p class="cu-card-subtitle">${studentState.application.spheres}</p>
              <div class="cu-action-row">
                <button class="cu-button-secondary" data-route="application">Смотреть заявку</button>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function applicationView() {
      return `
        ${studentHeader("Карьерная заявка", "Путь студента", "Первый шаг, чтобы зафиксировать контекст студента, его цели и карьерные ожидания.")}

        <section class="cu-section cu-panel cu-panel-pad">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
            <div>${badge(studentState.application.submitted ? "Заявка отправлена" : "Черновик", studentState.application.submitted ? "green" : "gray")}</div>
          </div>

          <form id="applicationForm" class="cu-grid-2" style="margin-top:20px">
            <div class="cu-soft-card">
              <h2 class="cu-card-title">Личная информация</h2>
              <div class="cu-fields">
                <label class="cu-field">
                  <span class="cu-field-label">ФИО</span>
                  <input class="cu-input" name="fullName" value="${studentState.application.fullName}">
                </label>
                <div class="cu-grid-2" style="gap:14px">
                  <label class="cu-field">
                    <span class="cu-field-label">Курс</span>
                    <input class="cu-input" name="course" value="${studentState.application.course}">
                  </label>
                  <label class="cu-field">
                    <span class="cu-field-label">Программа</span>
                    <input class="cu-input" name="program" value="${studentState.application.program}">
                  </label>
                </div>
                <div class="cu-field">
                  <span class="cu-field-label">Что ищу сейчас</span>
                  <div class="cu-segmented">
                    <button type="button" class="cu-segment ${studentState.application.track === "Стажировка" ? "active" : ""}" data-track="Стажировка">
                      <div class="cu-segment-title">Стажировка</div>
                      <div class="cu-segment-copy">Подходит для первого карьерного шага с сопровождением.</div>
                    </button>
                    <button type="button" class="cu-segment ${studentState.application.track === "Работа" ? "active" : ""}" data-track="Работа">
                      <div class="cu-segment-title">Работа</div>
                      <div class="cu-segment-copy">Фокус на полноценную роль после assessment.</div>
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div class="cu-soft-card">
              <h2 class="cu-card-title">Карьерные ожидания</h2>
              <div class="cu-fields">
                <label class="cu-field">
                  <span class="cu-field-label">Желаемый грейд</span>
                  <input class="cu-input" name="grade" value="${studentState.application.grade}">
                </label>
                <label class="cu-field">
                  <span class="cu-field-label">Интересующие сферы</span>
                  <input class="cu-input" name="spheres" value="${studentState.application.spheres}">
                </label>
                <label class="cu-field">
                  <span class="cu-field-label">Комментарий</span>
                  <textarea class="cu-textarea" name="expectations">${studentState.application.expectations}</textarea>
                </label>
              </div>
              <div class="cu-action-row">
                <button type="button" class="cu-button-secondary" data-action="save-application">Сохранить черновик</button>
                <button type="button" class="cu-button" data-action="submit-application">Отправить заявку</button>
              </div>
            </div>
          </form>
        </section>
      `;
    }

    function resumeView() {
      return `
        ${studentHeader("Резюме", "Путь студента", "Можно загрузить готовое резюме или выбрать слот консультации, если резюме нужно создать или доработать.")}

        <section class="cu-section cu-panel cu-panel-pad">
          <div class="cu-progress">
            ${step(1, "Заявка", "Пройдено", { done: true })}
            <div class="cu-progress-line"></div>
            ${step(2, "Резюме", studentState.resume.status, { active: true })}
            <div class="cu-progress-line"></div>
            ${step(3, "Assessment", "Ожидает")}
            <div class="cu-progress-line"></div>
            ${step(4, "Вакансии", "Ожидает")}
          </div>
        </section>

        <section class="cu-section cu-panel cu-panel-pad">
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
            <h2 class="cu-card-title">Резюме</h2>
            ${badge(studentState.resume.status, "blue")}
          </div>
          <p class="cu-card-subtitle">После этого шага запрос попадет менеджеру, а студент увидит следующий этап в карьерном пути.</p>

          <div class="cu-split-actions" style="margin-top:24px">
            <div class="cu-choice-card">
              <div class="cu-label">Загрузить резюме</div>
              <div class="cu-strong">${studentState.resume.fileName || "Файл пока не загружен"}</div>
              <p class="cu-card-subtitle">PDF, DOCX или TXT. После загрузки резюме будет отправлено на проверку.</p>
              <div class="cu-action-row">
                <button class="cu-button-secondary" data-action="upload-resume">Загрузить</button>
              </div>
            </div>

            <div class="cu-choice-card">
              <div class="cu-label">Создать с консультантом</div>
              <div class="cu-strong">${studentState.resume.consultSlot || "Слот пока не выбран"}</div>
              <p class="cu-card-subtitle">Если резюме нет, можно выбрать удобное время консультации и отправить запрос менеджеру.</p>
              <div class="cu-action-row">
                <button class="cu-button" data-route="calendar">Выбрать время</button>
                <button class="cu-button-secondary" data-action="send-request">Отправить запрос</button>
              </div>
            </div>
          </div>

          <div class="cu-note" style="margin-top:22px">
            <strong>Важно:</strong> даже если резюме еще не готово, запрос на помощь нужно отправить, чтобы менеджер увидел кейс и взял его в работу.
          </div>
        </section>
      `;
    }

    function calendarView() {
      const slots = [
        "Пн, 28 апреля · 17:00",
        "Вт, 29 апреля · 11:30",
        "Ср, 30 апреля · 16:00",
        "Чт, 1 мая · 13:00",
        "Пт, 2 мая · 18:30"
      ];

      return `
        ${studentHeader("Календарь", "Календарь", "Экран спроектирован под будущую интеграцию с Яндекс Календарем и LMS: студент видит свободные слоты и подтверждает запись.")}

        <section class="cu-section cu-grid-2">
          <div class="cu-panel cu-panel-pad">
            <h2 class="cu-card-title">Выбор слота</h2>
            <div class="cu-slot-grid" style="margin-top:22px">
              ${slots.map(slot => `
                <button class="cu-slot ${studentState.calendar.selectedSlot === slot ? "active" : ""}" data-slot="${slot}">
                  <div class="cu-label">Карьерная консультация</div>
                  <div class="cu-strong">${slot}</div>
                  <div class="cu-card-subtitle" style="margin-top:6px">45 минут, online</div>
                </button>
              `).join("")}
            </div>
          </div>

          <div class="cu-panel cu-panel-pad">
            <h2 class="cu-card-title">Подтверждение</h2>
            <div class="cu-soft-card" style="margin-top:22px">
              <div class="cu-label">Выбранный слот</div>
              <div class="cu-strong">${studentState.calendar.selectedSlot || "Слот пока не выбран"}</div>
            </div>
            <p class="cu-card-subtitle">Кнопка подтверждения активируется только после выбора времени.</p>
            <div class="cu-action-row">
              <button class="cu-button" data-action="confirm-slot" ${studentState.calendar.selectedSlot ? "" : "disabled"}>Подтвердить слот</button>
              <button class="cu-button-secondary" data-route="resume">Назад</button>
            </div>
          </div>
        </section>
      `;
    }

    function assessmentView() {
      const slots = ["6 мая · 16:00", "7 мая · 12:00", "8 мая · 18:00"];

      return `
        ${studentHeader("Assessment", "Путь студента", "Обязательный этап для всех студентов: запись на интервью, фиксация результата, грейда и обратной связи от ассесора.")}

        <section class="cu-section cu-grid-2">
          <div class="cu-panel cu-panel-pad">
            <h2 class="cu-card-title">Запись на assessment</h2>
            <div class="cu-list">
              ${slots.map(slot => `
                <button class="cu-list-row ${studentState.assessment.slot === slot ? "active" : ""}" style="${studentState.assessment.slot === slot ? "border-color:#cfd8ff;background:#f1f4ff" : ""}" data-assessment-slot="${slot}">
                  <div>
                    <div class="cu-list-title">${slot}</div>
                    <div class="cu-list-copy">Собеседование по хардам и определению грейда.</div>
                  </div>
                </button>
              `).join("")}
            </div>
            <div class="cu-action-row">
              <button class="cu-button" data-action="confirm-assessment">Подтвердить время</button>
              <button class="cu-button-secondary" data-action="complete-assessment">Показать результат</button>
            </div>
          </div>

          <div class="cu-panel cu-panel-pad">
            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
              <h2 class="cu-card-title">Результат assessment</h2>
              ${badge(studentState.assessment.status, "amber")}
            </div>
            <div class="cu-grid-2" style="margin-top:22px;gap:14px">
              <div class="cu-soft-card">
                <div class="cu-label">Выбранный слот</div>
                <div class="cu-strong">${studentState.assessment.slot || "Не выбран"}</div>
              </div>
              <div class="cu-soft-card">
                <div class="cu-label">Установленный грейд</div>
                <div class="cu-strong">${studentState.assessment.grade}</div>
              </div>
            </div>
            <div class="cu-soft-card" style="margin-top:14px">
              <div class="cu-label">Обратная связь от ассесора</div>
              <div class="cu-card-subtitle" style="margin-top:8px">${studentState.assessment.feedback}</div>
            </div>
            <div class="cu-action-row">
              <button class="cu-button-secondary" data-route="vacancies">Перейти к вакансиям</button>
            </div>
          </div>
        </section>
      `;
    }

    function vacanciesView() {
      return `
        ${studentHeader("Вакансии", "Вакансии", "После assessment студент видит релевантные вакансии и может расставить приоритеты. Менеджер использует этот приоритет при отправке резюме партнерам.")}

        <section class="cu-section">
          <div class="cu-list">
            ${studentState.vacancies.map(vacancy => `
              <div class="cu-panel cu-panel-pad">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap">
                  <div style="max-width:760px">
                    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
                      <div class="cu-label" style="text-transform:uppercase;letter-spacing:.1em">${vacancy.company}</div>
                      ${badge(vacancy.status, "gray")}
                    </div>
                    <div class="cu-strong" style="margin-top:10px">${vacancy.role}</div>
                    <div class="cu-card-subtitle">${vacancy.why}</div>
                  </div>
                  <div class="cu-soft-card" style="min-width:280px">
                    <div class="cu-label">Ваш приоритет</div>
                    <div class="cu-strong">${vacancy.priority ? `#${vacancy.priority}` : "Не выбран"}</div>
                    <div class="cu-mini-actions">
                      <button class="cu-button-quiet" data-priority="${vacancy.id}:1">1</button>
                      <button class="cu-button-quiet" data-priority="${vacancy.id}:2">2</button>
                      <button class="cu-button-quiet" data-priority="${vacancy.id}:3">3</button>
                    </div>
                    <div class="cu-mini-actions">
                      <button class="cu-button-secondary" data-action="skip-vacancy" data-id="${vacancy.id}">Неинтересно</button>
                      <button class="cu-button" data-action="confirm-priority" data-id="${vacancy.id}">Подтвердить</button>
                    </div>
                  </div>
                </div>
              </div>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderStudent() {
      document.getElementById("studentNav").innerHTML = studentNavView();

      const views = {
        journey: journeyView,
        application: applicationView,
        resume: resumeView,
        calendar: calendarView,
        assessment: assessmentView,
        vacancies: vacanciesView
      };

      document.getElementById("studentContent").innerHTML = views[studentState.view]();
    }

    function toast(message) {
      const el = document.getElementById("studentToast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.classList.remove("show"), 2200);
    }

    function readApplicationForm() {
      const form = document.getElementById("applicationForm");
      if (!form) return;
      const data = new FormData(form);
      studentState.application.fullName = data.get("fullName");
      studentState.application.course = data.get("course");
      studentState.application.program = data.get("program");
      studentState.application.grade = data.get("grade");
      studentState.application.spheres = data.get("spheres");
      studentState.application.expectations = data.get("expectations");
    }

    document.addEventListener("click", (event) => {
      const routeButton = event.target.closest("[data-route]");
      if (routeButton) {
        const route = routeButton.dataset.route;
        if (studentRouteViews.has(route)) {
          studentState.view = route;
          renderStudent();
        }
        return;
      }

      const trackButton = event.target.closest("[data-track]");
      if (trackButton) {
        studentState.application.track = trackButton.dataset.track;
        renderStudent();
        return;
      }

      const slotButton = event.target.closest("[data-slot]");
      if (slotButton) {
        studentState.calendar.selectedSlot = slotButton.dataset.slot;
        renderStudent();
        return;
      }

      const assessmentSlotButton = event.target.closest("[data-assessment-slot]");
      if (assessmentSlotButton) {
        studentState.assessment.slot = assessmentSlotButton.dataset.assessmentSlot;
        renderStudent();
        return;
      }

      const priorityButton = event.target.closest("[data-priority]");
      if (priorityButton) {
        const [id, priority] = priorityButton.dataset.priority.split(":");
        const vacancy = studentState.vacancies.find((item) => item.id === Number(id));
        if (vacancy) {
          vacancy.priority = Number(priority);
          toast(`Для ${vacancy.company} выбран приоритет #${priority}`);
          renderStudent();
        }
        return;
      }

      const actionButton = event.target.closest("[data-action]");
      if (!actionButton) return;

      const action = actionButton.dataset.action;

      if (action === "save-application") {
        readApplicationForm();
        toast("Черновик заявки сохранен");
        return;
      }

      if (action === "submit-application") {
        readApplicationForm();
        studentState.application.submitted = true;
        studentState.view = "resume";
        toast("Заявка отправлена");
        renderStudent();
        return;
      }

      if (action === "upload-resume") {
        studentState.resume.fileName = "Resume_Anna_Kuznetsova.pdf";
        studentState.resume.status = "На проверке";
        studentState.resume.note = "Резюме загружено. Менеджер увидит его в рабочем кабинете.";
        toast("Резюме загружено");
        renderStudent();
        return;
      }

      if (action === "send-request") {
        if (!studentState.resume.consultSlot) {
          toast("Сначала выберите слот консультации");
          return;
        }
        studentState.resume.status = "Консультация назначена";
        studentState.resume.note = "Запрос отправлен. Слот синхронизируется через календарную интеграцию.";
        toast("Запрос на консультацию отправлен");
        renderStudent();
        return;
      }

      if (action === "confirm-slot") {
        if (!studentState.calendar.selectedSlot) {
          toast("Сначала выберите время");
          return;
        }
        studentState.resume.consultSlot = studentState.calendar.selectedSlot;
        studentState.resume.status = "Консультация назначена";
        studentState.view = "resume";
        toast("Слот подтвержден");
        renderStudent();
        return;
      }

      if (action === "confirm-assessment") {
        if (!studentState.assessment.slot) {
          toast("Сначала выберите время assessment");
          return;
        }
        studentState.assessment.status = "Запланирован";
        toast("Assessment запланирован");
        renderStudent();
        return;
      }

      if (action === "complete-assessment") {
        studentState.assessment.status = "Завершен";
        studentState.assessment.grade = "Junior";
        studentState.assessment.feedback = "Сильная база по аналитике и структурное мышление. Рекомендуется усилить практику SQL и кейсы по приоритизации.";
        toast("Результат обновлен");
        renderStudent();
        return;
      }

      if (action === "skip-vacancy") {
        const vacancy = studentState.vacancies.find((item) => item.id === Number(actionButton.dataset.id));
        if (vacancy) {
          vacancy.status = "Неинтересно";
          vacancy.priority = null;
          toast(`Вакансия ${vacancy.company} скрыта`);
          renderStudent();
        }
        return;
      }

      if (action === "confirm-priority") {
        const vacancy = studentState.vacancies.find((item) => item.id === Number(actionButton.dataset.id));
        if (vacancy) {
          vacancy.status = vacancy.priority ? "Приоритет подтвержден" : vacancy.status;
          toast(vacancy.priority ? "Приоритет сохранен" : "Сначала выберите приоритет");
          renderStudent();
        }
      }
    });

    renderStudent();
  </script>
</body>
</html>
